name = "discord-reaction-moderator"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
BOT_USER_ID = ""  # Set your bot's user ID after creating it in Discord Developer Portal

# Discord Credentials (set as secrets, not here)
# wrangler secret put DISCORD_BOT_TOKEN
# wrangler secret put DISCORD_PUBLIC_KEY

[[durable_objects.bindings]]
name = "MODERATION_STORE_DO"
class_name = "ModerationStoreDO"

[[durable_objects.bindings]]
name = "GATEWAY_SESSION_DO"
class_name = "GatewaySessionDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ModerationStoreDO", "GatewaySessionDO"]
