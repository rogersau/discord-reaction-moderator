name = "discord-automation-workers"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
BOT_USER_ID = "123456789012345678"  # Set your bot's user ID after creating it in Discord Developer Portal
DISCORD_PUBLIC_KEY = "your-discord-public-key"  # Copy from Discord Developer Portal > General Information
DISCORD_APPLICATION_ID = "123456789012345678"  # Copy the application ID for slash command syncs

[triggers]
crons = ["*/5 * * * *"]

# Discord Credentials (set as secrets, not here)
# wrangler secret put DISCORD_BOT_TOKEN
# wrangler secret put ADMIN_UI_PASSWORD
# Optional for bearer-protected legacy admin routes:
# wrangler secret put ADMIN_AUTH_SECRET

[[durable_objects.bindings]]
name = "MODERATION_STORE_DO"
class_name = "ModerationStoreDO"

[[durable_objects.bindings]]
name = "GATEWAY_SESSION_DO"
class_name = "GatewaySessionDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ModerationStoreDO", "GatewaySessionDO"]
