name = "discord-automation-workers"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
BOT_USER_ID = "1493404817677090856" # Set your bot's user ID after creating it in Discord Developer Portal
DISCORD_PUBLIC_KEY = "9113b842d4ade29e412959490d5a7dff2e74c41b12500c73612285bf4ca0e6b5" # Copy from Discord Developer Portal > General Information
DISCORD_APPLICATION_ID = "1493404817677090856" # Copy the application ID for slash command syncs

[triggers]
crons = ["*/5 * * * *"]

# Discord Credentials (set as secrets, not here)
# wrangler secret put DISCORD_BOT_TOKEN
# wrangler secret put ADMIN_UI_PASSWORD
# wrangler secret put ADMIN_SESSION_SECRET
# Optional for bearer-protected legacy admin routes:
# wrangler secret put ADMIN_AUTH_SECRET

[[durable_objects.bindings]]
name = "COMMUNITY_STORE_DO"
class_name = "CommunityStoreDO"

[[durable_objects.bindings]]
name = "GATEWAY_SESSION_DO"
class_name = "GatewaySessionDO"

[[r2_buckets]]
binding = "TICKET_TRANSCRIPTS_BUCKET"
bucket_name = "discord-automation-workers-transcripts"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ModerationStoreDO", "GatewaySessionDO"]

[[migrations]]
tag = "v2"
renamed_classes = [{from = "ModerationStoreDO", to = "CommunityStoreDO"}]
